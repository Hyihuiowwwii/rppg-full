{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Session History</h1>

<div class="panel">
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Mode</th>
                <th>Subject</th>
                <th>Avg BPM</th>
                <th>Min BPM</th>
                <th>Max BPM</th>
                <th>Samples</th>
            </tr>
        </thead>
        <tbody>
            {% for row in logs %}
            <tr>
                <td>{{ row.created_at }}</td>
                <td>{{ row.mode }}</td>
                <td>{{ row.subject }}</td>
                <td>{{ row.avg_bpm }}</td>
                <td>{{ row.min_bpm }}</td>
                <td>{{ row.max_bpm }}</td>
                <td>{{ row.samples }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
